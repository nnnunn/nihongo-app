<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にほんご学習 — 日文學習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1015;
  --paper: #faf6f0;
  --red: #c0392b;
  --red-light: #e8c0bb;
  --gold: #c8972a;
  --gold-light: #f0e4c0;
  --mist: #e8e2d8;
  --shadow: rgba(26,16,21,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--paper); color:var(--ink); font-family:'Noto Sans TC',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1015' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); pointer-events:none; z-index:0; }

header { position:relative; z-index:1; padding:40px 60px 30px; display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid var(--mist); }
.logo-jp { font-family:'Noto Serif JP',serif; font-size:28px; font-weight:700; color:var(--red); letter-spacing:4px; }
.logo-sub { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); }
.xp-area { display:flex; align-items:center; gap:12px; font-size:12px; opacity:0.6; }
.xp-badge { background:var(--gold); color:white; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; opacity:1; }

nav { position:relative; z-index:1; display:flex; padding:0 60px; border-bottom:2px solid var(--mist); background:var(--paper); }
.tab { padding:16px 28px; cursor:pointer; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink); opacity:0.45; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.3s; }
.tab:hover { opacity:0.75; }
.tab.active { opacity:1; color:var(--red); border-bottom-color:var(--red); font-weight:500; }

main { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:48px 60px; }
.section { display:none; }
.section.active { display:block; }
.section-title { font-family:'DM Serif Display',serif; font-size:36px; font-weight:400; margin-bottom:8px; }
.section-title span { font-family:'Noto Serif JP',serif; color:var(--red); font-size:20px; margin-left:12px; }
.section-desc { font-size:14px; opacity:0.5; margin-bottom:40px; letter-spacing:0.5px; }

/* KANA */
.kana-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:48px; }
.kana-card { background:white; border:1px solid var(--mist); border-radius:8px; padding:20px 10px; text-align:center; cursor:pointer; transition:all 0.25s; box-shadow:0 2px 8px var(--shadow); }
.kana-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px var(--shadow); border-color:var(--red-light); }
.kana-card.learned { background:var(--gold-light); border-color:var(--gold); }
.kana-char { font-family:'Noto Serif JP',serif; font-size:32px; display:block; margin-bottom:6px; }
.kana-rom { font-size:11px; letter-spacing:2px; text-transform:uppercase; opacity:0.45; }
.kana-card.learned .kana-rom { color:var(--gold); opacity:0.9; }

/* VOCAB */
.vocab-controls { margin-bottom:28px; display:flex; flex-direction:column; gap:14px; }
.theme-chips { display:flex; flex-wrap:wrap; gap:8px; }
.theme-chip { background:white; border:1.5px solid var(--mist); border-radius:20px; padding:7px 16px; font-size:13px; font-family:inherit; cursor:pointer; color:var(--ink); opacity:0.6; transition:all 0.2s; }
.theme-chip:hover { opacity:1; border-color:var(--gold); }
.theme-chip.active { background:var(--ink); color:white; border-color:var(--ink); opacity:1; }
.shuffle-btn { display:inline-flex; align-items:center; gap:7px; background:var(--red); color:white; border:none; padding:10px 20px; border-radius:6px; font-size:13px; letter-spacing:1px; cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.2s; box-shadow:0 3px 12px rgba(192,57,43,0.3); }
.shuffle-btn:hover { background:#a93226; transform:translateY(-1px); }

.vocab-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.vocab-card { background:white; border:1px solid var(--mist); border-radius:10px; padding:24px 28px; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden; box-shadow:0 2px 8px var(--shadow); }
.vocab-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--red); opacity:0; transition:opacity 0.3s; }
.vocab-card:hover::before { opacity:1; }
.vocab-card:hover { transform:translateX(4px); box-shadow:0 6px 20px var(--shadow); }
.vocab-jp { font-family:'Noto Serif JP',serif; font-size:26px; margin-bottom:4px; }
.vocab-reading { font-size:12px; color:var(--red); letter-spacing:1px; margin-bottom:10px; }
.vocab-zh { font-size:15px; opacity:0.6; }
.vocab-tag { position:absolute; top:16px; right:16px; font-size:10px; padding:3px 10px; border-radius:20px; background:var(--mist); letter-spacing:1px; text-transform:uppercase; opacity:0.5; }
.vocab-example { font-size:12px; opacity:0; max-height:0; overflow:hidden; transition:all 0.4s; margin-top:0; font-style:italic; border-top:1px solid transparent; }
.vocab-card.expanded .vocab-example { opacity:0.6; max-height:60px; margin-top:12px; padding-top:12px; border-top-color:var(--mist); }
.speak-btn { display:inline-flex; align-items:center; gap:5px; background:none; border:1px solid var(--mist); border-radius:20px; padding:4px 12px; font-size:11px; color:var(--ink); opacity:0.55; cursor:pointer; font-family:inherit; margin-top:10px; transition:all 0.2s; }
.speak-btn:hover { opacity:1; border-color:var(--red); color:var(--red); }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.speak-btn.speaking { opacity:1; border-color:var(--gold); color:var(--gold); animation:pulse 0.8s infinite; }

/* GRAMMAR */
.grammar-list { display:flex; flex-direction:column; gap:20px; }
.grammar-item { background:white; border:1px solid var(--mist); border-radius:10px; overflow:hidden; box-shadow:0 2px 8px var(--shadow); }
.grammar-header { padding:22px 28px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:background 0.2s; }
.grammar-header:hover { background:var(--gold-light); }
.grammar-title-jp { font-family:'Noto Serif JP',serif; font-size:20px; color:var(--red); margin-bottom:4px; }
.grammar-title-zh { font-size:13px; opacity:0.5; }
.grammar-toggle { font-size:20px; opacity:0.3; transition:transform 0.3s; }
.grammar-item.open .grammar-toggle { transform:rotate(45deg); opacity:0.7; }
.grammar-body { max-height:0; overflow:hidden; transition:max-height 0.4s; padding:0 28px; }
.grammar-item.open .grammar-body { max-height:400px; padding-bottom:24px; }
.grammar-pattern { background:var(--mist); padding:12px 18px; border-radius:6px; font-family:'Noto Serif JP',serif; font-size:15px; color:var(--red); margin-bottom:16px; }
.grammar-examples { display:flex; flex-direction:column; gap:12px; }
.grammar-ex { border-left:3px solid var(--red-light); padding-left:16px; }
.grammar-ex-jp { font-family:'Noto Serif JP',serif; font-size:16px; margin-bottom:4px; }
.grammar-ex-zh { font-size:13px; opacity:0.5; }

/* QUIZ */
.quiz-mode-btns { display:flex; gap:10px; margin-bottom:20px; }
.quiz-mode-btn { flex:1; padding:12px; border:2px solid var(--mist); border-radius:8px; background:white; font-family:inherit; font-size:14px; cursor:pointer; color:var(--ink); opacity:0.5; transition:all 0.2s; }
.quiz-mode-btn:hover { opacity:0.8; }
.quiz-mode-btn.active { border-color:var(--red); color:var(--red); opacity:1; font-weight:500; }

.listen-options { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:28px; padding:14px 18px; background:white; border:1px solid var(--mist); border-radius:8px; }
.listen-options label { font-size:12px; opacity:0.5; letter-spacing:1px; margin-right:4px; }
.option-btn { background:white; border:1.5px solid var(--mist); border-radius:20px; padding:5px 14px; font-size:12px; font-family:inherit; cursor:pointer; color:var(--ink); opacity:0.55; transition:all 0.2s; }
.option-btn:hover { opacity:1; border-color:var(--gold); }
.option-btn.active { background:var(--ink); color:white; border-color:var(--ink); opacity:1; }
.option-select { border:1.5px solid var(--mist); border-radius:20px; padding:5px 14px; font-family:inherit; font-size:12px; background:white; color:var(--ink); cursor:pointer; }

.quiz-container { max-width:560px; margin:0 auto; }
.quiz-progress { display:flex; gap:6px; margin-bottom:32px; }
.quiz-dot { height:4px; flex:1; border-radius:2px; background:var(--mist); transition:background 0.3s; }
.quiz-dot.done { background:var(--red); }
.quiz-dot.current { background:var(--gold); }
.quiz-counter { text-align:right; font-size:12px; opacity:0.4; margin-bottom:20px; }

/* TYPE MODE */
.quiz-question { text-align:center; margin-bottom:48px; animation:fadeUp 0.4s ease; }
.quiz-char { font-family:'Noto Serif JP',serif; font-size:96px; display:block; line-height:1; margin-bottom:12px; }
.quiz-prompt { font-size:13px; letter-spacing:2px; text-transform:uppercase; opacity:0.4; }
.quiz-input-wrap { display:flex; gap:10px; align-items:center; }
.quiz-input { flex:1; background:white; border:2px solid var(--mist); padding:16px 20px; border-radius:8px; font-size:18px; font-family:inherit; letter-spacing:3px; color:var(--ink); outline:none; transition:border-color 0.2s; box-shadow:0 2px 8px var(--shadow); }
.quiz-input:focus { border-color:var(--gold); }
.quiz-input.correct { border-color:#4caf50; background:#e8f5e9; color:#2e7d32; }
.quiz-input.wrong { border-color:#ef9a9a; background:#ffebee; color:#c62828; }
.quiz-submit { background:var(--ink); color:white; border:none; padding:16px 24px; border-radius:8px; font-size:13px; letter-spacing:2px; cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.2s; white-space:nowrap; }
.quiz-submit:hover { background:var(--red); }

/* LISTEN MODE */
.listen-word-area { text-align:center; margin-bottom:32px; }
.play-btn { background:var(--red); color:white; border:none; border-radius:50%; width:72px; height:72px; font-size:28px; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(192,57,43,0.35); display:inline-flex; align-items:center; justify-content:center; }
.play-btn:hover { transform:scale(1.08); }
.play-btn.playing { background:var(--gold); animation:pulse 0.8s infinite; }
.speed-row { display:flex; gap:8px; justify-content:center; margin-top:12px; }
.speed-btn { background:white; border:1.5px solid var(--mist); border-radius:20px; padding:5px 16px; font-size:12px; font-family:inherit; cursor:pointer; color:var(--ink); opacity:0.55; transition:all 0.2s; }
.speed-btn:hover { opacity:1; border-color:var(--gold); }
.speed-btn.active { background:var(--ink); color:white; border-color:var(--ink); opacity:1; }
.listen-hint { font-size:12px; opacity:0.4; margin-top:8px; }

.tile-section { margin-bottom:16px; }
.tile-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; opacity:0.4; margin-bottom:8px; }
.answer-slots { display:flex; flex-wrap:wrap; gap:8px; min-height:56px; padding:10px; border:2px dashed var(--mist); border-radius:8px; background:rgba(255,255,255,0.6); margin-bottom:16px; align-items:center; transition:border-color 0.2s; }
.tile-pool { display:flex; flex-wrap:wrap; gap:8px; padding:10px; border:1.5px solid var(--mist); border-radius:8px; background:white; min-height:56px; align-items:center; }
.kana-tile { font-family:'Noto Serif JP',serif; font-size:22px; background:white; border:1.5px solid var(--mist); border-radius:6px; width:48px; height:52px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; box-shadow:0 2px 6px var(--shadow); transition:all 0.15s; }
.kana-tile:hover { border-color:var(--gold); transform:translateY(-2px); }
.kana-tile.correct-tile { border-color:#4caf50; background:#e8f5e9; }
.kana-tile.wrong-tile { border-color:#ef9a9a; background:#ffebee; }

.check-btn { display:block; margin:20px auto 0; background:var(--ink); color:white; border:none; padding:13px 36px; border-radius:6px; font-size:13px; letter-spacing:2px; cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.2s; }
.check-btn:hover { background:var(--red); }

.quiz-feedback { text-align:center; margin-top:24px; font-size:14px; min-height:22px; }
.quiz-feedback.ok { color:#2e7d32; }
.quiz-feedback.fail { color:var(--red); }

.next-btn { display:block; margin:28px auto 0; background:var(--red); color:white; border:none; padding:14px 40px; border-radius:4px; font-size:13px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.3s; box-shadow:0 4px 16px rgba(192,57,43,0.3); }
.next-btn:hover { background:#a93226; transform:translateY(-2px); }

.score-display { text-align:center; padding:60px 0; animation:fadeUp 0.5s ease; }
.score-number { font-family:'DM Serif Display',serif; font-size:80px; color:var(--red); line-height:1; }
.score-label { font-size:14px; letter-spacing:3px; text-transform:uppercase; opacity:0.5; margin:12px 0 32px; }

.quiz-review { margin-top:32px; border:1px solid var(--mist); border-radius:10px; overflow:hidden; }
.review-row { display:grid; grid-template-columns:80px 1fr 1fr 50px; padding:10px 20px; font-size:13px; border-bottom:1px solid var(--mist); align-items:center; gap:12px; }
.review-row:last-child { border-bottom:none; }
.review-row.header { background:var(--mist); font-weight:500; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
.review-row.ok { background:#f1f9f1; }
.review-row.ng { background:#fff5f5; }
.review-char { font-family:'Noto Serif JP',serif; font-size:20px; }
.review-ok { color:#2e7d32; }
.review-ng { color:var(--red); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

@media (max-width:680px) {
  header { padding:16px 16px 14px; flex-wrap:wrap; gap:8px; }
  .logo-jp { font-size:22px; letter-spacing:2px; }
  .logo-sub { font-size:10px; }
  .xp-area { font-size:11px; }
  .xp-badge { padding:3px 10px; font-size:11px; }

  nav { padding:0; overflow-x:auto; -webkit-overflow-scrolling:touch; white-space:nowrap; display:flex; }
  .tab { padding:12px 14px; font-size:11px; letter-spacing:0.5px; flex-shrink:0; }

  main { padding:24px 16px; }
  .section-title { font-size:26px; }
  .section-title span { font-size:16px; }
  .section-desc { font-size:13px; margin-bottom:24px; }

  .kana-grid { gap:6px; }
  .kana-card { padding:12px 4px; border-radius:6px; }
  .kana-char { font-size:22px; margin-bottom:4px; }
  .kana-rom { font-size:9px; letter-spacing:1px; }

  .theme-chips { gap:6px; }
  .theme-chip { padding:6px 12px; font-size:12px; }
  .shuffle-btn { padding:9px 16px; font-size:12px; }
  .vocab-grid { grid-template-columns:1fr; gap:12px; }
  .vocab-card { padding:18px 18px; }
  .vocab-jp { font-size:22px; }
  .vocab-zh { font-size:14px; }

  .grammar-header { padding:16px 18px; }
  .grammar-title-jp { font-size:17px; }
  .grammar-body { padding:0 18px; }
  .grammar-pattern { font-size:13px; }

  .quiz-mode-btns { gap:8px; }
  .quiz-mode-btn { font-size:13px; padding:10px; }
  .listen-options { padding:10px 12px; gap:6px; }
  .option-btn { padding:4px 10px; font-size:11px; }

  .quiz-container { max-width:100%; }
  .quiz-char { font-size:72px; }
  .quiz-prompt { font-size:11px; }
  .quiz-input-wrap { flex-direction:column; gap:8px; }
  .quiz-input { font-size:16px; padding:14px 14px; width:100%; }
  .quiz-submit { padding:14px; font-size:12px; letter-spacing:1px; width:100%; }

  .play-btn { width:62px; height:62px; font-size:24px; }
  .kana-tile { width:42px; height:46px; font-size:18px; }
  .tile-pool { gap:6px; padding:8px; }
  .answer-slots { gap:6px; padding:8px; min-height:50px; }
  .check-btn { padding:12px 28px; font-size:12px; }

  .score-number { font-size:60px; }
  .review-row { grid-template-columns:54px 1fr 1fr 36px; padding:8px 12px; font-size:12px; gap:6px; }
  .review-char { font-size:18px; }

  .next-btn { padding:12px 28px; font-size:12px; letter-spacing:2px; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-jp">にほんご</div>
    <div class="logo-sub">日文自學帳 · Japanese Notebook</div>
  </div>
  <div class="xp-area">
    <span id="xp-count">0 XP</span>
    <span class="xp-badge" id="level-badge">初心者</span>
  </div>
</header>

<nav>
  <div class="tab active" onclick="showTab('hiragana')">平假名</div>
  <div class="tab" onclick="showTab('katakana')">片假名</div>
  <div class="tab" onclick="showTab('vocab')">單字</div>
  <div class="tab" onclick="showTab('grammar')">文法</div>
  <div class="tab" onclick="showTab('quiz')">測驗</div>
</nav>

<main>

  <section class="section active" id="hiragana">
    <h2 class="section-title">平假名 <span>ひらがな</span></h2>
    <p class="section-desc">點擊卡片學習，再次點擊標記為已學習 ✓</p>
    <div class="kana-grid" id="hiragana-grid"></div>
  </section>

  <section class="section" id="katakana">
    <h2 class="section-title">片假名 <span>カタカナ</span></h2>
    <p class="section-desc">外來語、強調詞彙使用片假名</p>
    <div class="kana-grid" id="katakana-grid"></div>
  </section>

  <section class="section" id="vocab">
    <h2 class="section-title">基礎單字 <span>たんご</span></h2>
    <p class="section-desc">選擇主題，每次隨機顯示 10 個單字，點擊卡片查看例句</p>
    <div class="vocab-controls">
      <div class="theme-chips" id="theme-chips">
        <button class="theme-chip active" onclick="selectTheme(this,'日常生活')">日常生活</button>
        <button class="theme-chip" onclick="selectTheme(this,'飲食料理')">飲食料理</button>
        <button class="theme-chip" onclick="selectTheme(this,'旅遊交通')">旅遊交通</button>
        <button class="theme-chip" onclick="selectTheme(this,'動物自然')">動物自然</button>
        <button class="theme-chip" onclick="selectTheme(this,'情緒感受')">情緒感受</button>
        <button class="theme-chip" onclick="selectTheme(this,'工作學習')">工作學習</button>
        <button class="theme-chip" onclick="selectTheme(this,'家庭關係')">家庭關係</button>
        <button class="theme-chip" onclick="selectTheme(this,'身體健康')">身體健康</button>
        <button class="theme-chip" onclick="selectTheme(this,'外來語')">🔤 外來語</button>
      </div>
      <div>
        <button class="shuffle-btn" onclick="shuffleVocab()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          換一批
        </button>
      </div>
    </div>
    <div class="vocab-grid" id="vocab-grid"></div>
  </section>

  <section class="section" id="grammar">
    <h2 class="section-title">文法入門 <span>ぶんぽう</span></h2>
    <p class="section-desc">點擊展開說明與例句</p>
    <div class="grammar-list" id="grammar-list"></div>
  </section>

  <section class="section" id="quiz">
    <h2 class="section-title">測驗 <span>テスト</span></h2>
    <div class="quiz-mode-btns">
      <button class="quiz-mode-btn active" id="modeBtn-type" onclick="setMode('type')">✍️ 輸入拼音</button>
      <button class="quiz-mode-btn" id="modeBtn-listen" onclick="setMode('listen')">👂 聽音排列</button>
    </div>
    <div id="listen-options-bar" style="display:none">
      <div class="listen-options">
        <label>題目來源：</label>

// ===== XP =====
function addXP(n) {
  xp += n;
  localStorage.setItem('xp', xp);
  document.getElementById('xp-count').textContent = xp + ' XP';
  var levels = [[0,'初心者'],[50,'入門者'],[150,'初級者'],[300,'中級者'],[600,'上級者']];
  var lv = '初心者';
  for (var i = 0; i < levels.length; i++) { if (xp >= levels[i][0]) lv = levels[i][1]; }
  document.getElementById('level-badge').textContent = lv;
}

// ===== TABS =====
function showTab(name) {
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(name).classList.add('active');
  var tabs = ['hiragana','katakana','vocab','grammar','quiz'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  if (name === 'quiz') initQuiz();
}

// ===== KANA GRID =====
function buildKanaGrid(data, id, prefix) {
  var grid = document.getElementById(id);
  for (var i = 0; i < data.length; i++) {
    var k = data[i];
    var card = document.createElement('div');
    if (!k.c) { card.className = 'kana-card'; card.style.visibility = 'hidden'; grid.appendChild(card); continue; }
    card.className = 'kana-card' + (learned.has(prefix+i) ? ' learned' : '');
    card.innerHTML = '<span class="kana-char">'+k.c+'</span><span class="kana-rom">'+k.r+'</span>';
    (function(card, key) {
      card.onclick = function() {
        if (learned.has(key)) { learned.delete(key); card.classList.remove('learned'); }
        else { learned.add(key); card.classList.add('learned'); addXP(2); }
        localStorage.setItem('learned', JSON.stringify(Array.from(learned)));
      };
    })(card, prefix+i);
    grid.appendChild(card);
  }
}

// ===== VOCAB =====
function speak(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.85;
  if (btn) { btn.classList.add('speaking'); u.onend = function(){ btn.classList.remove('speaking'); }; }
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

function pick(arr, n) { return shuffle(arr).slice(0, n); }

function renderVocab(list) {
  var grid = document.getElementById('vocab-grid');
  grid.innerHTML = '';
  for (var i = 0; i < list.length; i++) {
    var v = list[i];
    var card = document.createElement('div');
    card.className = 'vocab-card';
    var safe = v.jp.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    card.innerHTML =
      '<span class="vocab-tag">'+v.tag+'</span>'+
      '<div class="vocab-jp">'+v.jp+'</div>'+
      '<div class="vocab-reading">'+v.rd+'</div>'+
      '<div class="vocab-zh">'+v.zh+'</div>'+
      '<button class="speak-btn" onclick="event.stopPropagation();speak(\''+safe+'\',this)">'+
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>'+
        '聽發音</button>'+
      '<div class="vocab-example">'+v.ex+'</div>';
    (function(card){ card.onclick = function(){ card.classList.toggle('expanded'); addXP(1); }; })(card);
    grid.appendChild(card);
  }
}

function selectTheme(btn, theme) {
  document.querySelectorAll('.theme-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  curTheme = theme;
  renderVocab(pick(vocabDB[theme] || [], 10));
}

function shuffleVocab() {
  renderVocab(pick(vocabDB[curTheme] || [], 10));
  addXP(1);
}

// ===== GRAMMAR =====
function buildGrammar() {
  var list = document.getElementById('grammar-list');
  for (var i = 0; i < grammar.length; i++) {
    var g = grammar[i];
    var item = document.createElement('div');
    item.className = 'grammar-item';
    var exHtml = g.examples.map(function(e){ return '<div class="grammar-ex"><div class="grammar-ex-jp">'+e.jp+'</div><div class="grammar-ex-zh">'+e.zh+'</div></div>'; }).join('');
    item.innerHTML =
      '<div class="grammar-header" onclick="this.parentElement.classList.toggle(\'open\')">'+
        '<div><div class="grammar-title-jp">'+g.jp+'</div><div class="grammar-title-zh">'+g.zh+'</div></div>'+
        '<span class="grammar-toggle">+</span>'+
      '</div>'+
      '<div class="grammar-body"><div class="grammar-pattern">'+g.pattern+'</div><div class="grammar-examples">'+exHtml+'</div></div>';
    list.appendChild(item);
  }
}

// ===== QUIZ MODE SWITCHING =====
function setMode(mode) {
  quizMode = mode;
  document.getElementById('modeBtn-type').classList.toggle('active', mode === 'type');
  document.getElementById('modeBtn-listen').classList.toggle('active', mode === 'listen');
  document.getElementById('listen-options-bar').style.display = mode === 'listen' ? 'block' : 'none';
  initQuiz();
}

function setListenSrc(src) {
  listenSrc = src;
  document.getElementById('srcBtn-kana').classList.toggle('active', src === 'kana');
  document.getElementById('srcBtn-vocab').classList.toggle('active', src === 'vocab');
  document.getElementById('listen-theme-sel').style.display = src === 'vocab' ? 'inline-block' : 'none';
  initQuiz();
}

// ===== QUIZ INIT =====
function initQuiz() {
  if (quizMode === 'listen' && listenSrc === 'vocab') {
    var theme = document.getElementById('listen-theme-sel').value;
    var pool = vocabDB[theme] || [];
    quizData = pick(pool, Math.min(20, pool.length));
  } else {
    var all = hiragana.filter(function(k){ return k.c !== ''; });
    quizData = pick(all, 20);
  }
  quizIdx = 0; quizScore = 0; answered = false;
  if (quizMode === 'listen') renderListenQ();
  else renderTypeQ();
}

// ===== TYPE QUIZ =====
function renderTypeQ() {
  var box = document.getElementById('quiz-container');
  if (quizIdx >= quizData.length) { showResult(box); return; }
  var q = quizData[quizIdx];
  var dots = quizData.map(function(_,i){ return '<div class="quiz-dot'+(i<quizIdx?' done':i===quizIdx?' current':'')+'"></div>'; }).join('');
  box.innerHTML =
    '<div class="quiz-progress">'+dots+'</div>'+
    '<div class="quiz-counter">'+(quizIdx+1)+' / '+quizData.length+'</div>'+
    '<div class="quiz-question"><span class="quiz-char">'+q.c+'</span><span class="quiz-prompt">輸入羅馬拼音（小寫英文）</span></div>'+
    '<div class="quiz-input-wrap">'+
      '<input class="quiz-input" id="qinp" type="text" placeholder="輸入答案..." autocomplete="off" autocapitalize="none" spellcheck="false">'+
      '<button class="quiz-submit" id="qsub" onclick="checkType()">確認</button>'+
    '</div>'+
    '<div class="quiz-feedback" id="qfb"></div>';
  answered = false;
  var inp = document.getElementById('qinp');
  inp.focus();
  inp.onkeydown = function(e){ if (e.key === 'Enter') checkType(); };
}

function checkType() {
  if (answered) { quizIdx++; renderTypeQ(); return; }
  var inp = document.getElementById('qinp');
  var sub = document.getElementById('qsub');
  var fb  = document.getElementById('qfb');
  var q   = quizData[quizIdx];
  var val = inp.value.trim().toLowerCase();
  if (!val) return;
  answered = true; inp.disabled = true;
  sub.textContent = quizIdx+1 >= quizData.length ? '查看結果 →' : '下一題 →';
  var alt = {shi:['si'],chi:['ti'],tsu:['tu'],fu:['hu'],ji:['zi','di'],zu:['du']};
  var ok  = val === q.r || (alt[q.r] && alt[q.r].indexOf(val) >= 0);
  if (ok) {
    inp.classList.add('correct'); quizScore++;
    fb.textContent = '正確！✓'; fb.className = 'quiz-feedback ok';
  } else {
    inp.classList.add('wrong');
    fb.innerHTML = '答錯了！正確答案：<strong>'+q.r+'</strong>'; fb.className = 'quiz-feedback fail';
  }
  quizData[quizIdx]._ok = ok; quizData[quizIdx]._ans = val;
}

// ===== LISTEN QUIZ =====
function renderListenQ() {
  var box = document.getElementById('quiz-container');
  if (quizIdx >= quizData.length) { showResult(box); return; }
  var q    = quizData[quizIdx];
  var word = q.c || q.jp;
  var chars = word.split('');
  var dots = quizData.map(function(_,i){ return '<div class="quiz-dot'+(i<quizIdx?' done':i===quizIdx?' current':'')+'"></div>'; }).join('');

  // Build tile pool
  var pool = chars.slice();
  if (listenSrc === 'kana' && chars.length === 1) {
    var others = hiragana.filter(function(k){ return k.c && k.c !== word; });
    var ext = pick(others, 2);
    pool = shuffle([word, ext[0].c, ext[1].c]);
  } else if (listenSrc === 'vocab') {
    var extraKana = hiragana.filter(function(k){ return k.c && chars.indexOf(k.c) < 0; });
    var extras = pick(extraKana, Math.max(2, Math.ceil(chars.length * 0.5)));
    pool = shuffle(chars.concat(extras.map(function(k){ return k.c; })));
  } else {
    pool = shuffle(pool);
  }

  var tilesHtml = pool.map(function(c, i){
    return '<div class="kana-tile" data-char="'+c+'" id="tile-'+quizIdx+'-'+i+'" onclick="tileTap(this)">'+c+'</div>';
  }).join('');

  var hint = (listenSrc === 'vocab' && q.zh) ? '　中文：'+q.zh : '';

  box.innerHTML =
    '<div class="quiz-progress">'+dots+'</div>'+
    '<div class="quiz-counter">'+(quizIdx+1)+' / '+quizData.length+'</div>'+
    '<div class="listen-word-area">'+
      '<button class="play-btn" id="pbtn" onclick="playWord()">▶</button>'+
      '<div class="speed-row">'+
        '<button class="speed-btn'+(listenSpd===1.0?' active':'')+'" onclick="setSpd(1.0,this)">正常</button>'+
        '<button class="speed-btn'+(listenSpd===0.5?' active':'')+'" onclick="setSpd(0.5,this)">慢速</button>'+
      '</div>'+
      '<div class="listen-hint">點擊播放，再點擊假名拼出正確順序'+hint+'</div>'+
    '</div>'+
    '<div class="tile-section">'+
      '<div class="tile-label">你的答案</div>'+
      '<div class="answer-slots" id="aslots"></div>'+
      '<div class="tile-label">可用假名</div>'+
      '<div class="tile-pool" id="tpool">'+tilesHtml+'</div>'+
    '</div>'+
    '<button class="check-btn" id="cbtn" onclick="checkListen()">確認答案</button>'+
    '<div class="quiz-feedback" id="qfb"></div>';

  answered = false;
  setTimeout(playWord, 400);
}

function playWord() {
  var q = quizData[quizIdx];
  var word = q.c || q.jp;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var btn = document.getElementById('pbtn');
  if (btn) { btn.classList.add('playing'); btn.textContent = '♪'; }
  var u = new SpeechSynthesisUtterance(word);
  u.lang = 'ja-JP'; u.rate = listenSpd;
  u.onend = function(){ var b = document.getElementById('pbtn'); if (b){ b.classList.remove('playing'); b.textContent = '▶'; } };
  window.speechSynthesis.speak(u);
}

function setSpd(s, btn) {
  listenSpd = s;
  document.querySelectorAll('.speed-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function tileTap(tile) {
  if (answered) return;
  var slots = document.getElementById('aslots');
  var pool  = document.getElementById('tpool');
  if (tile.parentElement === pool) slots.appendChild(tile);
  else pool.appendChild(tile);
}

function checkListen() {
  if (answered) { quizIdx++; renderListenQ(); return; }
  var slots = document.getElementById('aslots');
  var fb    = document.getElementById('qfb');
  var cbtn  = document.getElementById('cbtn');
  var q     = quizData[quizIdx];
  var word  = q.c || q.jp;
  var tiles = slots.querySelectorAll('.kana-tile');
  var ans   = Array.from(tiles).map(function(t){ return t.getAttribute('data-char'); }).join('');

  answered = true;
  cbtn.textContent = quizIdx+1 >= quizData.length ? '查看結果 →' : '下一題 →';

  var ok = ans === word;
  if (ok) {
    tiles.forEach(function(t){ t.classList.add('correct-tile'); });
    quizScore++;
    fb.textContent = '正確！✓　'+word+(q.zh ? '（'+q.zh+'）' : q.r ? '（'+q.r+'）' : '');
    fb.className = 'quiz-feedback ok';
  } else {
    tiles.forEach(function(t){ t.classList.add('wrong-tile'); });
    fb.innerHTML = '答錯了！正確：<strong>'+word+'</strong>'+(q.zh ? '（'+q.zh+'）' : q.r ? '（'+q.r+'）' : '');
    fb.className = 'quiz-feedback fail';
  }
  quizData[quizIdx]._ok = ok; quizData[quizIdx]._ans = ans;
}

// ===== RESULT =====
function showResult(box) {
  addXP(quizScore * 5);
  var pct   = Math.round(quizScore / quizData.length * 100);
  var emoji = pct===100?'🎉':pct>=80?'😊':pct>=60?'🙂':'😅';
  var rows  = quizData.map(function(q){
    var word = q.c || q.jp;
    var cor  = q.r || word;
    var ans  = q._ans !== undefined ? q._ans : '—';
    return '<div class="review-row '+(q._ok?'ok':'ng')+'">'+
      '<div class="review-char">'+word+'</div>'+
      '<div class="'+(q._ok?'review-ok':'review-ng')+'">'+cor+'</div>'+
      '<div class="'+(q._ok?'review-ok':'review-ng')+'">'+ans+'</div>'+
      '<div style="text-align:center">'+(q._ok?'✓':'✗')+'</div>'+
    '</div>';
  }).join('');
  box.innerHTML =
    '<div class="score-display">'+
      '<div class="score-number">'+quizScore+'<span style="font-size:36px;opacity:0.4">/'+quizData.length+'</span></div>'+
      '<div class="score-label">'+emoji+' 答對率 '+pct+'%</div>'+
      '<button class="next-btn" onclick="initQuiz()">再試一次</button>'+
    '</div>'+
    '<div class="quiz-review">'+
      '<div class="review-row header"><div>單字</div><div>正解</div><div>你的答案</div><div></div></div>'+
      rows+
    '</div>';
}

// ===== INIT =====
buildKanaGrid(hiragana, 'hiragana-grid', 'h');
buildKanaGrid(katakana, 'katakana-grid', 'k');
renderVocab(pick(vocabDB['日常生活'], 10));
buildGrammar();
addXP(0);
</script>
